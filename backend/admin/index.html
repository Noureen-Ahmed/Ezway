<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ezway Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
  <style>
    :root {
      --primary: #002147;
      --accent:  #FDC800;
      --success: #10B981;
      --danger:  #EF4444;
      --warning: #F59E0B;
      --gray-50:  #F9FAFB;
      --gray-100: #F3F4F6;
      --gray-200: #E5E7EB;
      --gray-400: #9CA3AF;
      --gray-500: #6B7280;
      --gray-700: #374151;
      --gray-900: #111827;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter',sans-serif; background:var(--gray-50); color:var(--gray-900); }

    /* ── Login ── */
    #loginPage {
      min-height:100vh; display:flex; align-items:center; justify-content:center;
      background:linear-gradient(135deg,var(--primary) 0%,#003A5D 100%);
    }
    .login-card {
      background:white; border-radius:20px; padding:40px; width:380px;
      box-shadow:0 20px 60px rgba(0,0,0,.3);
    }
    .login-logo { text-align:center; margin-bottom:28px; }
    .logo-badge {
      width:56px; height:56px; background:var(--accent); border-radius:14px;
      display:inline-flex; align-items:center; justify-content:center;
      font-size:22px; font-weight:700; color:var(--primary); margin-bottom:12px;
    }
    .login-title { font-size:22px; font-weight:700; margin-bottom:4px; }
    .login-sub   { font-size:13px; color:var(--gray-500); }
    .form-group  { margin-bottom:14px; }
    .form-label  { display:block; font-size:13px; font-weight:500; margin-bottom:6px; color:var(--gray-700); }
    .form-input  {
      width:100%; padding:11px 14px; border:1px solid var(--gray-200);
      border-radius:10px; font-size:14px; outline:none; transition:.2s;
    }
    .form-input:focus { border-color:var(--primary); box-shadow:0 0 0 3px rgba(0,33,71,.08); }
    .btn-login {
      width:100%; padding:12px; background:var(--primary); color:var(--accent);
      border:none; border-radius:10px; font-size:15px; font-weight:600; cursor:pointer;
      margin-top:6px; display:flex; align-items:center; justify-content:center; gap:8px;
      transition:.2s;
    }
    .btn-login:hover { background:#003A5D; }
    .err-banner {
      background:#FEF2F2; color:var(--danger); border:1px solid #FECACA;
      border-radius:8px; padding:10px 14px; font-size:13px; margin-bottom:14px;
      display:none;
    }

    /* ── App Shell ── */
    #app { display:none; min-height:100vh; }

    .topbar {
      background:var(--primary); color:white; height:60px; display:flex;
      align-items:center; justify-content:space-between; padding:0 28px;
      position:sticky; top:0; z-index:50;
    }
    .topbar-brand { display:flex; align-items:center; gap:10px; }
    .topbar-badge {
      width:34px; height:34px; background:var(--accent); border-radius:8px;
      display:flex; align-items:center; justify-content:center;
      font-weight:700; font-size:14px; color:var(--primary);
    }
    .topbar-title { font-size:17px; font-weight:700; }
    .topbar-title span { color:var(--accent); }
    .topbar-right { display:flex; align-items:center; gap:12px; }
    .admin-chip {
      background:rgba(255,255,255,.12); border-radius:20px; padding:5px 12px;
      font-size:12px; font-weight:500;
    }
    .logout-btn {
      background:rgba(255,255,255,.1); border:none; color:white; border-radius:8px;
      padding:7px 14px; font-size:13px; cursor:pointer; display:flex; align-items:center; gap:6px;
      transition:.2s;
    }
    .logout-btn:hover { background:rgba(255,255,255,.2); }

    .content { max-width:860px; margin:0 auto; padding:32px 20px; }

    /* ── Stats row ── */
    .stats-row { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-bottom:28px; }
    .stat-card {
      background:white; border-radius:14px; padding:20px 22px;
      border:1px solid var(--gray-100); box-shadow:0 1px 3px rgba(0,0,0,.04);
    }
    .stat-icon { font-size:22px; margin-bottom:8px; }
    .stat-val  { font-size:28px; font-weight:700; }
    .stat-lbl  { font-size:13px; color:var(--gray-500); margin-top:2px; }

    /* ── Card ── */
    .card {
      background:white; border-radius:16px; border:1px solid var(--gray-100);
      box-shadow:0 1px 3px rgba(0,0,0,.04); overflow:hidden; margin-bottom:20px;
    }
    .card-header {
      padding:18px 22px; border-bottom:1px solid var(--gray-100);
      display:flex; align-items:center; gap:10px;
    }
    .card-header i { font-size:20px; color:var(--primary); }
    .card-header h2 { font-size:16px; font-weight:600; }
    .card-body { padding:22px; }

    /* ── Settings row ── */
    .settings-row { display:flex; gap:14px; flex-wrap:wrap; align-items:flex-end; }
    .field { flex:1; min-width:140px; }
    .field label { display:block; font-size:13px; font-weight:500; color:var(--gray-700); margin-bottom:6px; }
    .field select, .field input[type=text] {
      width:100%; padding:10px 12px; border:1px solid var(--gray-200);
      border-radius:9px; font-size:14px; background:white; outline:none; transition:.2s;
    }
    .field select:focus, .field input:focus { border-color:var(--primary); }
    .dryrun-wrap { display:flex; align-items:center; gap:8px; padding-bottom:2px; }
    .dryrun-wrap input { width:16px; height:16px; cursor:pointer; accent-color:var(--primary); }
    .dryrun-wrap label { font-size:13px; font-weight:500; color:var(--gray-700); cursor:pointer; }

    /* ── Drop zone ── */
    .drop-zone {
      border:2px dashed var(--gray-200); border-radius:14px; padding:44px 20px;
      text-align:center; cursor:pointer; transition:.2s; margin:0;
    }
    .drop-zone:hover, .drop-zone.has-file { border-color:var(--primary); }
    .drop-zone i { font-size:44px; color:var(--gray-400); display:block; margin-bottom:10px; }
    .drop-zone.has-file i { color:var(--primary); }
    .drop-zone-title { font-size:15px; font-weight:600; color:var(--gray-700); }
    .drop-zone-sub   { font-size:12px; color:var(--gray-400); margin-top:4px; }

    /* ── Action buttons ── */
    .action-row { display:flex; gap:12px; margin-top:16px; }
    .btn {
      flex:1; padding:12px; border:none; border-radius:10px; font-size:14px;
      font-weight:600; cursor:pointer; display:flex; align-items:center;
      justify-content:center; gap:8px; transition:.2s;
    }
    .btn:disabled { opacity:.45; cursor:not-allowed; }
    .btn-outline {
      background:white; border:1px solid var(--gray-200); color:var(--gray-700);
    }
    .btn-outline:hover:not(:disabled) { background:var(--gray-50); }
    .btn-primary { background:var(--primary); color:var(--accent); flex:2; }
    .btn-primary:hover:not(:disabled) { background:#003A5D; }

    /* ── Progress ── */
    .progress-wrap { display:none; text-align:center; padding:36px; }
    .spinner {
      width:38px; height:38px; border:3px solid var(--gray-200);
      border-top-color:var(--primary); border-radius:50%;
      animation:spin 1s linear infinite; margin:0 auto 14px;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
    .progress-lbl { color:var(--gray-500); font-size:14px; }

    /* ── Result ── */
    .result-card {
      border-radius:14px; border:1px solid; padding:20px 22px; margin-top:16px;
      display:none;
    }
    .result-card.success { background:#F0FDF4; border-color:#BBF7D0; }
    .result-card.warning { background:#FFFBEB; border-color:#FDE68A; }
    .result-card.info    { background:#EFF6FF; border-color:#BFDBFE; }
    .result-card.error   { background:#FEF2F2; border-color:#FECACA; }
    .result-header { display:flex; align-items:center; gap:10px; margin-bottom:16px; }
    .result-header i { font-size:20px; }
    .result-header span { font-size:16px; font-weight:600; }
    .result-stats { display:flex; gap:32px; flex-wrap:wrap; margin-bottom:14px; }
    .result-stat .val { font-size:24px; font-weight:700; }
    .result-stat .lbl { font-size:12px; color:var(--gray-500); margin-top:1px; }
    .chips { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px; }
    .chip {
      background:white; border:1px solid var(--gray-200); border-radius:20px;
      padding:3px 10px; font-size:12px;
    }
    .err-list { margin-top:10px; }
    .err-item { font-size:12px; color:var(--danger); padding:3px 0; }
    .sample-table { width:100%; border-collapse:collapse; margin-top:12px; font-size:12px; }
    .sample-table th { background:var(--gray-50); padding:7px 10px; text-align:left; color:var(--gray-500); font-size:11px; text-transform:uppercase; }
    .sample-table td { padding:7px 10px; border-top:1px solid var(--gray-100); }

    /* ── Toast ── */
    .toast-wrap { position:fixed; top:20px; right:20px; z-index:999; }
    .toast {
      border-radius:10px; padding:14px 18px; margin-bottom:8px;
      display:flex; align-items:center; gap:10px; font-size:14px; font-weight:500;
      box-shadow:0 8px 30px rgba(0,0,0,.15); animation:slideIn .3s ease;
      color:white;
    }
    .toast.success { background:var(--success); }
    .toast.error   { background:var(--danger); }
    @keyframes slideIn { from { transform:translateX(120%); opacity:0; } to { transform:translateX(0); opacity:1; } }
  </style>
</head>
<body>

<div class="toast-wrap" id="toasts"></div>

<!-- ── Login ── -->
<div id="loginPage">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-badge">E</div>
      <div class="login-title">Ezway Admin</div>
      <div class="login-sub">Faculty of Science · ASU</div>
    </div>
    <div class="err-banner" id="loginErr"></div>
    <form id="loginForm">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" id="loginEmail" class="form-input" placeholder="admin@sci.asu.edu.eg" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="loginPassword" class="form-input" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-login">
        <i class="ri-login-box-line"></i> Sign In
      </button>
    </form>
  </div>
</div>

<!-- ── App ── -->
<div id="app">
  <div class="topbar">
    <div class="topbar-brand">
      <div class="topbar-badge">E</div>
      <div class="topbar-title">Ezway <span>Admin</span></div>
    </div>
    <div class="topbar-right">
      <span class="admin-chip" id="adminEmail"></span>
      <button class="logout-btn" id="logoutBtn"><i class="ri-logout-box-line"></i> Logout</button>
    </div>
  </div>

  <div class="content">

    <!-- Stats -->
    <div class="stats-row" id="statsRow">
      <div class="stat-card">
        <div class="stat-icon">📅</div>
        <div class="stat-val" id="statSlots">—</div>
        <div class="stat-lbl">Schedule Slots in DB</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">📚</div>
        <div class="stat-val" id="statCourses">—</div>
        <div class="stat-lbl">Courses in DB</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🔗</div>
        <div class="stat-val" id="statPython">—</div>
        <div class="stat-lbl">Python Runtime</div>
      </div>
    </div>

    <!-- Import settings -->
    <div class="card">
      <div class="card-header">
        <i class="ri-settings-3-line"></i>
        <h2>Import Settings</h2>
      </div>
      <div class="card-body">
        <div class="settings-row">
          <div class="field">
            <label>Semester</label>
            <select id="semester">
              <option value="Spring">Spring</option>
              <option value="Fall">Fall</option>
              <option value="Summer">Summer</option>
            </select>
          </div>
          <div class="field">
            <label>Academic Year</label>
            <input type="text" id="academicYear" value="2025/2026" placeholder="2025/2026">
          </div>
          <div class="dryrun-wrap">
            <input type="checkbox" id="dryRun">
            <label for="dryRun">Dry run (no DB write)</label>
          </div>
        </div>
      </div>
    </div>

    <!-- PDF Upload -->
    <div class="card">
      <div class="card-header">
        <i class="ri-file-upload-line"></i>
        <h2>Upload Schedule PDF</h2>
      </div>
      <div class="card-body">
        <input type="file" id="pdfInput" accept=".pdf" style="display:none" onchange="onFile(event)">

        <div class="drop-zone" id="dropZone" onclick="document.getElementById('pdfInput').click()">
          <i class="ri-file-pdf-2-line"></i>
          <div class="drop-zone-title" id="dzTitle">Click to choose a PDF file</div>
          <div class="drop-zone-sub">Faculty of Science · ASU schedule format · max 50 MB</div>
        </div>

        <div class="action-row">
          <button class="btn btn-outline" id="previewBtn" onclick="submit('preview')" disabled>
            <i class="ri-eye-line"></i> Preview
          </button>
          <button class="btn btn-primary" id="importBtn" onclick="submit('upload')" disabled>
            <i class="ri-upload-cloud-2-line"></i> Import to Database
          </button>
        </div>

        <div class="progress-wrap" id="progress">
          <div class="spinner"></div>
          <div class="progress-lbl" id="progressLbl">Processing…</div>
        </div>

        <div class="result-card" id="result"></div>
      </div>
    </div>

    <!-- Re-link button -->
    <button onclick="relink()" style="
      background:white; border:1px solid var(--gray-200); border-radius:10px;
      padding:10px 18px; font-size:13px; font-weight:500; cursor:pointer;
      display:flex; align-items:center; gap:8px; color:var(--gray-700);
      transition:.2s;
    " onmouseover="this.style.background='var(--gray-50)'" onmouseout="this.style.background='white'">
      <i class="ri-links-line"></i>
      Re-link existing students to imported schedules
    </button>

  </div>
</div>

<script>
  const API = 'http://localhost:3000/api';
  let token = localStorage.getItem('ez_admin_token');
  let pdfFile = null;

  // ── Boot ──────────────────────────────────────────────────────────────────
  if (token) showApp();

  // ── Login ─────────────────────────────────────────────────────────────────
  document.getElementById('loginForm').addEventListener('submit', async e => {
    e.preventDefault();
    const email    = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const errEl    = document.getElementById('loginErr');
    errEl.style.display = 'none';

    try {
      const res  = await fetch(`${API}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (!res.ok || !data.token) throw new Error(data.error || 'Login failed');
      if (data.user.role !== 'admin' && data.user.role !== 'ADMIN') throw new Error('Admin access only');

      token = data.token;
      localStorage.setItem('ez_admin_token', token);
      document.getElementById('adminEmail').textContent = data.user.email;
      showApp();
    } catch (err) {
      errEl.textContent    = err.message;
      errEl.style.display  = 'block';
    }
  });

  // ── Logout ────────────────────────────────────────────────────────────────
  document.getElementById('logoutBtn').addEventListener('click', () => {
    localStorage.removeItem('ez_admin_token');
    token = null;
    pdfFile = null;
    document.getElementById('app').style.display   = 'none';
    document.getElementById('loginPage').style.display = 'flex';
  });

  // ── Show app ──────────────────────────────────────────────────────────────
  function showApp() {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('app').style.display       = 'block';
    loadStatus();
  }

  // ── Status ────────────────────────────────────────────────────────────────
  async function loadStatus() {
    try {
      const res  = await fetch(`${API}/admin/schedule-import/status`, { headers: authHeader() });
      const data = await res.json();
      document.getElementById('statSlots').textContent   = data.scheduleSlots ?? '—';
      document.getElementById('statCourses').textContent = data.courses ?? '—';
      document.getElementById('statPython').textContent  = data.pythonBin ?? '—';
    } catch (_) {}
  }

  // ── File picker ───────────────────────────────────────────────────────────
  function onFile(e) {
    pdfFile = e.target.files[0];
    if (!pdfFile) return;
    const dz = document.getElementById('dropZone');
    dz.classList.add('has-file');
    document.getElementById('dzTitle').textContent =
      `${pdfFile.name}  (${(pdfFile.size / 1024).toFixed(1)} KB)`;
    document.getElementById('previewBtn').disabled = false;
    document.getElementById('importBtn').disabled  = false;
    document.getElementById('result').style.display = 'none';
  }

  // ── Submit ────────────────────────────────────────────────────────────────
  async function submit(mode) {
    if (!pdfFile) return;

    const semester     = document.getElementById('semester').value;
    const academicYear = document.getElementById('academicYear').value;
    const dryRun       = document.getElementById('dryRun').checked;

    setLoading(true, mode === 'preview' ? 'Scraping PDF…' : 'Importing to database…');

    const form = new FormData();
    form.append('file', pdfFile);
    form.append('semester', semester);
    form.append('academicYear', academicYear);
    if (mode === 'upload') form.append('dryRun', String(dryRun));

    try {
      const res  = await fetch(`${API}/admin/schedule-import/${mode}`, {
        method: 'POST',
        headers: authHeader(),
        body: form
      });
      const data = await res.json();
      if (!data.success) throw new Error(data.error || 'Failed');
      showResult(data, mode);
      loadStatus();
      toast(mode === 'preview' ? 'Preview ready' : 'Import complete!', 'success');
    } catch (err) {
      showError(err.message);
      toast(err.message, 'error');
    } finally {
      setLoading(false);
    }
  }

  // ── Re-link ───────────────────────────────────────────────────────────────
  async function relink() {
    try {
      const res  = await fetch(`${API}/admin/schedule-import/relink`, {
        method: 'POST', headers: authHeader()
      });
      const data = await res.json();
      toast(`Linked ${data.enrollmentsLinked} student enrollments`, 'success');
      loadStatus();
    } catch (err) {
      toast(err.message, 'error');
    }
  }

  // ── Render result ─────────────────────────────────────────────────────────
  function showResult(data, mode) {
    const r        = data.report || data;
    const isPreview = mode === 'preview';
    const errors   = r.errors || [];
    const programs = r.programs || [];
    const samples  = (isPreview ? (r.schedules || []) : (r.dryRunPreview || [])).slice(0, 8);

    const cls   = isPreview ? 'info' : (errors.length ? 'warning' : 'success');
    const icon  = isPreview ? 'ri-eye-line' : (errors.length ? 'ri-error-warning-line' : 'ri-checkbox-circle-line');
    const title = isPreview ? 'Preview Results'
                : (r.dryRun ? 'Dry Run Complete' : 'Import Complete');

    const statsHtml = `
      <div class="result-stats">
        <div class="result-stat">
          <div class="val">${r.totalEntries ?? r.scrapedEntries ?? 0}</div>
          <div class="lbl">Entries scraped</div>
        </div>
        ${!isPreview ? `
        <div class="result-stat">
          <div class="val" style="color:var(--success)">${r.schedulesInserted ?? 0}</div>
          <div class="lbl">Slots saved</div>
        </div>
        <div class="result-stat">
          <div class="val" style="color:var(--success)">${r.enrollmentsLinked ?? 0}</div>
          <div class="lbl">Students linked</div>
        </div>
        <div class="result-stat">
          <div class="val" style="color:${errors.length ? 'var(--danger)' : 'inherit'}">${errors.length}</div>
          <div class="lbl">Errors</div>
        </div>
        ${r.durationMs != null ? `<div class="result-stat"><div class="val">${r.durationMs}ms</div><div class="lbl">Duration</div></div>` : ''}
        ` : ''}
        <div class="result-stat">
          <div class="val">${programs.length}</div>
          <div class="lbl">Programs</div>
        </div>
      </div>`;

    const chipsHtml = programs.length
      ? `<div class="chips">${programs.map(p => `<span class="chip">${p}</span>`).join('')}</div>` : '';

    const errHtml = errors.length
      ? `<div class="err-list">
          ${errors.slice(0, 5).map(e => `<div class="err-item">• ${e.entry}: ${(e.reasons||[]).join(', ')}</div>`).join('')}
          ${errors.length > 5 ? `<div class="err-item" style="color:var(--gray-400)">…and ${errors.length - 5} more</div>` : ''}
        </div>` : '';

    const tableHtml = samples.length ? `
      <table class="sample-table">
        <thead><tr><th>Code</th><th>Day</th><th>Time</th><th>Location</th><th>Program</th></tr></thead>
        <tbody>
          ${samples.map(s => `<tr>
            <td><strong>${s.courseCode || 'N/A'}</strong></td>
            <td>${s.dayOfWeek || '?'}</td>
            <td>${s.startTime || '?'} – ${s.endTime || '?'}</td>
            <td>${s.location || '—'}</td>
            <td>${s.program || '—'}</td>
          </tr>`).join('')}
        </tbody>
      </table>` : '';

    const el = document.getElementById('result');
    el.className    = `result-card ${cls}`;
    el.style.display = 'block';
    el.innerHTML = `
      <div class="result-header">
        <i class="${icon}" style="color:${cls==='success'?'var(--success)':cls==='warning'?'var(--warning)':'#3B82F6'}"></i>
        <span>${title}</span>
      </div>
      ${statsHtml}
      ${chipsHtml}
      ${errHtml}
      ${tableHtml}`;
  }

  function showError(msg) {
    const el = document.getElementById('result');
    el.className     = 'result-card error';
    el.style.display = 'block';
    el.innerHTML = `
      <div class="result-header">
        <i class="ri-error-warning-line" style="color:var(--danger)"></i>
        <span>Error</span>
      </div>
      <div style="font-size:14px;">${msg}</div>`;
  }

  // ── Helpers ───────────────────────────────────────────────────────────────
  function authHeader() { return { 'Authorization': `Bearer ${token}` }; }

  function setLoading(on, label = '') {
    document.getElementById('progress').style.display   = on ? 'block' : 'none';
    document.getElementById('progressLbl').textContent  = label;
    document.getElementById('previewBtn').disabled      = on || !pdfFile;
    document.getElementById('importBtn').disabled       = on || !pdfFile;
    if (on) document.getElementById('result').style.display = 'none';
  }

  function toast(msg, type = 'success') {
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    t.innerHTML = `<i class="ri-${type === 'success' ? 'check' : 'error-warning'}-line"></i> ${msg}`;
    document.getElementById('toasts').appendChild(t);
    setTimeout(() => t.remove(), 3500);
  }
</script>
</body>
</html>
